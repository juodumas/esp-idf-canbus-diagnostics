; Minimal ESP32-C3 CAN-bus diagnostic tool.
; Pins/125kbps match worm-relay.yaml but this is an independent pure-ESP-IDF app.
[platformio]
default_envs = esp32-c3-devkitm-1

[env:esp32-c3-devkitm-1]
platform        = espressif32
board           = esp32-c3-devkitm-1
framework       = espidf
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize
build_flags     = -Wall
                  -DCAN_TX=21
                  -DCAN_RX=20
                  -DBTN_SEND=9
